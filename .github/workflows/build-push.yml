name: Build & Push Docker Image

# Triggers when a PR is merged into rc/* (or any direct push to rc/*)
on:
    push:
        branches:
            - "rc/**"

jobs:
    build-and-push:
        name: Build & Push to Docker Hub
        runs-on: ubuntu-latest
        env:
            IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/satryawiguna-api

        outputs:
            sha_tag: ${{ steps.sha.outputs.short_sha }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get short commit SHA
              id: sha
              run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  target: runtime
                  push: true
                  # Two tags:
                  #   :dev         — mutable "latest dev build" pointer
                  #   :sha-<hash>  — immutable reference used for deployments
                  tags: |
                      ${{ env.IMAGE_REPO }}:dev
                      ${{ env.IMAGE_REPO }}:sha-${{ steps.sha.outputs.short_sha }}
                  # Layer cache speeds up subsequent builds significantly
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Write job summary
              run: |
                  echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "| | |" >> "$GITHUB_STEP_SUMMARY"
                  echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Registry** | Docker Hub \`${{ secrets.DOCKERHUB_USERNAME }}/satryawiguna-api\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "| **Tags pushed** | \`:dev\`, \`:sha-${{ steps.sha.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "### Next steps" >> "$GITHUB_STEP_SUMMARY"
                  echo "1. Trigger **Deploy to Development** with tag: \`sha-${{ steps.sha.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "2. Verify the dev site, then trigger **Deploy to Production** with the same tag." >> "$GITHUB_STEP_SUMMARY"
