name: Deploy to Production

# Manual trigger — promotes the current :dev image to :latest and deploys
on:
    workflow_dispatch:

jobs:
    promote-and-deploy:
        name: Promote :dev → :latest → Prod Server (:8002)
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Promote :dev → :latest
              env:
                  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/satryawiguna-api
              run: |
                  docker pull "$IMAGE_REPO:dev"
                  docker tag "$IMAGE_REPO:dev" "$IMAGE_REPO:latest"
                  docker push "$IMAGE_REPO:latest"

            - name: Deploy to prod server via SSH
              uses: appleboy/ssh-action@v1.0.3
              env:
                  DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
                  DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
                  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/satryawiguna-api
                  APP_DIR: ${{ secrets.PROD_SSH_APP_DIR }}
              with:
                  host: ${{ secrets.PROD_SSH_HOST }}
                  username: ${{ secrets.PROD_SSH_USER }}
                  key: ${{ secrets.PROD_SSH_KEY }}
                  envs: DH_TOKEN,DH_USER,IMAGE_REPO,APP_DIR
                  script: |
                      set -e
                      echo "$DH_TOKEN" | docker login -u "$DH_USER" --password-stdin
                      docker pull "$IMAGE_REPO:latest"
                      docker tag "$IMAGE_REPO:latest" satryawiguna_api:prod
                      cd "$APP_DIR"
                      docker compose -f docker-compose.prod.yml up -d --no-build
                      docker image prune -f
                      echo "Production deployment complete"
