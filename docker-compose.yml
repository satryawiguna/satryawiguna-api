# ─────────────────────────────────────────────────────────────────────────────
# Shared Infrastructure — MySQL + phpMyAdmin
#
# Run first (always):
#   docker network create satryawiguna_network
#   docker compose -f docker-compose.yml up -d
#
# Then start dev or prod:
#   docker compose -f docker-compose.dev.yml up -d   (API on :8001)
#   docker compose -f docker-compose.prod.yml up -d  (API on :8002)
#
# phpMyAdmin:  http://localhost:8080
#   Dev DB  → login with root_dev / MYSQL_DEV_PASSWORD
#   Prod DB → login with root    / MYSQL_ROOT_PASSWORD
# ─────────────────────────────────────────────────────────────────────────────

networks:
  satryawiguna_network:
    external: true

volumes:
  mysql_data:
    name: satryawiguna_mysql_data

services:
  mysql:
    image: mysql:8.0
    container_name: satryawiguna_mysql
    restart: unless-stopped
    env_file:
      - .env.mysql
    environment:
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - satryawiguna_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: satryawiguna_phpmyadmin
    restart: unless-stopped
    environment:
      # PMA_ARBITRARY=1 lets users log in with any MySQL server/user/password
      PMA_ARBITRARY: 1
      PMA_HOST: satryawiguna_mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - satryawiguna_network
